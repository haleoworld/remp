<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>Showings</title>
<script>
  // Apply saved theme before first paint to avoid a flash of the wrong colors.
  (function(){
    try {
      var t = localStorage.getItem('showings_theme') || 'auto';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) { document.documentElement.setAttribute('data-theme', 'auto'); }
  })();
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f7f9f9;
    --text: #0f1419;
    --text-soft: #536471;
    --muted: #71767b;
    --border: #eff3f4;
    --border-strong: #cfd9de;
    --accent: #0f1419;
    --accent-text: #ffffff;
    --good: #00ba7c;
    --warn: #ff9e1c;
    --bad: #f4212e;
    --hover: #f7f9f9;
    --header-bg: rgba(255,255,255,0.85);
    --shadow: 0 0 0 1px rgba(0,0,0,.04);
  }
  /* Explicit dark theme */
  :root[data-theme="dark"] {
    --bg: #000000;
    --bg-soft: #16181c;
    --text: #e7e9ea;
    --text-soft: #71767b;
    --muted: #71767b;
    --border: #2f3336;
    --border-strong: #3e4144;
    --accent: #ffffff;
    --accent-text: #0f1419;
    --hover: #16181c;
    --header-bg: rgba(0,0,0,0.85);
  }
  /* Auto theme follows the OS when set to dark */
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] {
      --bg: #000000;
      --bg-soft: #16181c;
      --text: #e7e9ea;
      --text-soft: #71767b;
      --muted: #71767b;
      --border: #2f3336;
      --border-strong: #3e4144;
      --accent: #ffffff;
      --accent-text: #0f1419;
      --hover: #16181c;
      --header-bg: rgba(0,0,0,0.85);
    }
  }

  .ico { width: 1em; height: 1em; display: inline-block; vertical-align: -0.13em; flex-shrink: 0; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, "Helvetica Neue", sans-serif;
    font-size: 15px; line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { min-height: 100vh; min-height: 100dvh; }
  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }
  button {
    font: inherit; color: inherit;
    background: none; border: none; padding: 0;
    cursor: pointer; -webkit-appearance: none;
  }
  input, textarea, select {
    font: inherit; color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    padding: 12px 14px;
    width: 100%;
    -webkit-appearance: none;
  }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
  }

  /* App shell */
  .app {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    position: relative;
  }
  @media (max-width: 640px) { .app { border: none; } }

  /* Header */
  .top {
    position: sticky; top: 0; z-index: 20;
    background: var(--header-bg);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex; align-items: center; gap: 8px;
    min-height: 53px;
  }
  .top h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.01em; flex: 1; }
  .top .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: background .15s;
  }
  .top .icon-btn:hover { background: var(--hover); }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); flex-shrink: 0;
  }
  .sync-dot.live { background: var(--good); animation: pulse 2s infinite; }
  .sync-dot.syncing { background: var(--warn); animation: pulse .8s infinite; }
  .sync-dot.error { background: var(--bad); }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Body */
  main { padding-bottom: 150px; }

  /* Feed item */
  .feed-item {
    display: flex; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .feed-item:active { background: var(--hover); }
  @media (hover: hover) { .feed-item:hover { background: var(--hover); } }
  .feed-item .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg-soft);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: var(--text-soft);
    flex-shrink: 0;
  }
  .feed-item .body { flex: 1; min-width: 0; }
  .feed-item .body h3 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.005em; }
  .feed-item .body .sub { color: var(--text-soft); font-size: 14px; margin-top: 2px; }
  .feed-item .body .meta { color: var(--muted); font-size: 13px; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .feed-item .right { flex-shrink: 0; text-align: right; }

  /* Listing card (also feed style) */
  .listing-feed {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .listing-feed:active { background: var(--hover); }
  @media (hover: hover) { .listing-feed:hover { background: var(--hover); } }
  .listing-feed .head { display: flex; gap: 12px; align-items: flex-start; }
  .listing-feed .head .addr { flex: 1; min-width: 0; }
  .listing-feed .head .addr h3 { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.3; }
  .listing-feed .head .addr .city { color: var(--text-soft); font-size: 14px; margin-top: 2px; }
  .listing-feed .head .price { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; text-align: right; }
  .listing-feed .specs { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; color: var(--text-soft); font-size: 14px; }
  .listing-feed .brief { color: var(--text-soft); font-size: 14px; line-height: 1.4; margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .listing-feed .actions { display: flex; gap: 6px; margin-top: 10px; align-items: center; }

  /* Score badge */
  .score {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 44px; height: 28px; padding: 0 10px;
    border-radius: 999px;
    font-weight: 700; font-size: 13px;
    background: var(--bg-soft); color: var(--text-soft); border: 1px solid var(--border);
  }
  .score.good { background: rgba(0,186,124,.1); color: var(--good); border-color: rgba(0,186,124,.25); }
  .score.warn { background: rgba(255,158,28,.1); color: var(--warn); border-color: rgba(255,158,28,.25); }
  .score.bad { background: rgba(244,33,46,.1); color: var(--bad); border-color: rgba(244,33,46,.25); }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center;
    padding: 2px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    background: var(--bg-soft); color: var(--text-soft);
    border: 1px solid var(--border);
  }
  .pill.dark { background: var(--accent); color: var(--accent-text); border: none; }
  .pill.good { background: rgba(0,186,124,.1); color: var(--good); border-color: rgba(0,186,124,.25); }
  .pill.warn { background: rgba(255,158,28,.1); color: var(--warn); border-color: rgba(255,158,28,.25); }
  .pill.bad { background: rgba(244,33,46,.1); color: var(--bad); border-color: rgba(244,33,46,.25); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px;
    border-radius: 999px;
    background: var(--accent); color: var(--accent-text);
    font-weight: 700; font-size: 14px; letter-spacing: -0.005em;
    transition: opacity .15s, transform .05s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn.small { padding: 6px 14px; font-size: 13px; }
  .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
  .btn.ghost:hover { background: var(--hover); }
  .btn.danger { background: var(--bad); color: white; }
  .btn.link { background: none; color: var(--text); padding: 6px 10px; text-decoration: underline; font-weight: 600; }
  .btn.full { width: 100%; }

  /* FAB */
  .fab {
    position: fixed;
    right: max(16px, calc(50vw - 284px));
    bottom: calc(126px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: var(--accent-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 300; line-height: 1;
    z-index: 15;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
    transition: transform .12s;
  }
  .fab:hover { transform: scale(1.06); }
  .fab:active { transform: scale(0.96); }

  /* Bottom tabs */
  nav.tabs {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 600px;
    background: var(--header-bg);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 14;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.tabs button {
    flex: 1;
    padding: 10px 0 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted);
    transition: color .12s;
  }
  nav.tabs button.active { color: var(--text); }
  nav.tabs .tab-icon { font-size: 22px; line-height: 1; }
  nav.tabs .tab-label { font-size: 11px; font-weight: 700; letter-spacing: 0.01em; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 0;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg); color: var(--text);
    width: 100%; max-width: 600px; max-height: 90vh;
    border-radius: 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (max-width: 640px) {
    .modal-backdrop { padding: 0; align-items: stretch; }
    .modal { border-radius: 0; max-height: 100vh; height: 100dvh; }
  }
  .modal-header {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex; align-items: center; gap: 8px;
    min-height: 53px; flex-shrink: 0;
  }
  .modal-header h2 { margin: 0; font-size: 18px; font-weight: 800; flex: 1; }
  .modal-header .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: background .15s;
  }
  .modal-header .icon-btn:hover { background: var(--hover); }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
  .modal-footer {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; gap: 8px; align-items: center;
    flex-shrink: 0;
  }

  /* Form fields */
  .field { margin-bottom: 16px; }
  .field label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 700; color: var(--text-soft);
    margin-bottom: 6px;
    letter-spacing: 0.005em;
  }
  .row2 { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  .row3 { display: grid; gap: 12px; grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 540px) { .row3 { grid-template-columns: 1fr 1fr; } }

  .group {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .group h3 { margin: 0 0 12px; font-size: 15px; font-weight: 800; }
  .group .group-sub { color: var(--muted); font-size: 13px; margin: -8px 0 12px; }

  /* Chip / tag input */
  .tag-input {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    background: var(--bg);
    min-height: 46px;
  }
  .tag-input input {
    border: none; padding: 4px; flex: 1; min-width: 100px;
    background: transparent;
  }
  .tag-input input:focus { outline: none; }
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 4px 3px 12px;
    border-radius: 999px;
    background: var(--bg-soft); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600;
  }
  .tag button {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 16px; line-height: 1;
  }
  .tag button:hover { background: var(--border); color: var(--text); }

  /* Toggle checkboxes (as chip row) */
  .chip-check {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .chip-check:hover { background: var(--hover); }
  .chip-check.on {
    background: var(--accent); color: var(--accent-text);
    border-color: var(--accent);
  }
  .chip-check input { display: none; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }

  /* Segmented control */
  .seg {
    display: inline-flex; padding: 3px;
    background: var(--bg-soft); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .seg button {
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px; font-weight: 700;
    color: var(--text-soft);
  }
  .seg button.on { background: var(--bg); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  /* Setup page (Areas & Intel + Mortgage) */
  .setup-wrap { padding: 14px 16px 0; }
  .setup-seg { display: flex; width: 100%; margin-bottom: 16px; }
  .setup-seg button { flex: 1; }

  /* Compare */
  .compare-wrap { padding: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .compare {
    display: grid; gap: 10px;
    grid-auto-flow: column;
    grid-auto-columns: minmax(220px, 1fr);
  }
  .compare-col {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    min-width: 0;
  }
  .compare-col h4 { margin: 0 0 4px; font-size: 14px; font-weight: 800; line-height: 1.3; }
  .compare-col dl { margin: 0; font-size: 13px; }
  .compare-col dt { color: var(--muted); margin-top: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .compare-col dd { margin: 1px 0 0; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: calc(132px + env(safe-area-inset-bottom));
    transform: translate(-50%, 8px);
    background: var(--accent); color: var(--accent-text);
    padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
    z-index: 200; pointer-events: none;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* Empty states */
  .empty {
    padding: 60px 24px;
    text-align: center;
  }
  .empty h2 { margin: 0 0 8px; font-size: 24px; font-weight: 800; letter-spacing: -0.01em; }
  .empty p { margin: 0; color: var(--text-soft); font-size: 15px; line-height: 1.5; max-width: 360px; margin: 0 auto; }
  .empty .actions { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

  /* Quick brief */
  .brief-wrap { padding: 16px; }
  .brief-wrap .addr { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.2; }
  .brief-wrap .city-type { color: var(--text-soft); font-size: 13px; margin-top: 2px; }
  .brief-wrap .price-big { font-size: 26px; font-weight: 800; letter-spacing: -0.015em; margin-top: 8px; }
  .brief-wrap .specs-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 12px; }
  .brief-wrap .stat {
    border: 1px solid var(--border); border-radius: 9px; padding: 7px 9px;
  }
  .brief-wrap .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; font-weight: 700; }
  .brief-wrap .stat .val { font-size: 14px; font-weight: 800; margin-top: 1px; letter-spacing: -0.005em; }
  .brief-wrap .stat .val .muted { font-weight: 500; }
  @media (max-width: 420px) { .brief-wrap .specs-grid { grid-template-columns: 1fr 1fr; } }
  .brief-wrap .talking {
    margin-top: 18px;
    padding: 14px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg-soft); font-size: 15px; line-height: 1.5;
  }
  .brief-wrap .url-block { margin-top: 16px; }
  .brief-wrap .url-block a { color: var(--text-soft); word-break: break-all; font-size: 13px; }

  /* Utility */
  .muted { color: var(--text-soft); }
  .smaller { font-size: 13px; }
  .stack > * + * { margin-top: 12px; }
  .hidden { display: none !important; }
  details { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
  details summary { cursor: pointer; font-weight: 700; outline: none; }
  details[open] summary { margin-bottom: 10px; }

  /* Filter bar (listings) */
  .filter-bar {
    display: flex; gap: 8px; padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--bg);
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 14px; border-radius: 999px;
    border: 1px solid var(--border-strong);
    font-size: 13px; font-weight: 600; white-space: nowrap;
    color: var(--text-soft);
    transition: background .12s;
  }
  .filter-chip:hover { background: var(--hover); }
  .filter-chip.on { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* Auth gate */
  .auth-wrap {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: var(--bg);
  }
  .auth-card {
    max-width: 380px; width: 100%;
    text-align: center;
  }
  .auth-card .logo {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--accent); color: var(--accent-text);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800;
    margin: 0 auto 24px;
  }

<script>
/*=========================================================
  Showings — Buyer Client Manager
  Single-file PWA, X-style minimal UI
  Storage: localStorage + optional GitHub Gist cloud sync
=========================================================*/

// ---- Data model & local storage --------------------
const STORAGE_KEY = 'showings_data_v2';
const SYNC_KEY = 'showings_sync_v1';
const DEFAULT_DATA = {
  clients: [],
  listings: [],
  // Shared, entity-keyed notes + AI summaries. Mapped to listings by matching value.
  entities: { neighbourhood: {}, community: {}, building: {}, city: {}, developer: {} },
  // In-app feedback / requests / improvements log, tagged by page.
  feedback: [],
  settings: {
    defaultDownPct: 20,
    defaultMortgageRate: 5.0,
    defaultAmortYears: 25,
    defaultInsuranceMonthly: 100,
  },
  updatedAt: null,
};
const DEFAULT_SYNC = {
  enabled: false,
  gistId: '',
  token: '',
  lastPullAt: null,
  lastPushAt: null,
};

let state = loadData();
let sync = loadSyncConfig();
let currentTab = 'clients';
let setupSub = 'areas'; // 'areas' | 'mortgage' — segmented sub-tab on the Setup page
let compareSelection = [];
let _filterClientId = '';
let _filterStatus = '';
let _onlyMatches = false;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Migrate from v1 if present
      const old = localStorage.getItem('showings_data_v1');
      if (old) {
        const d = JSON.parse(old);
        d.updatedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
        return d;
      }
      return structuredClone(DEFAULT_DATA);
    }
    const d = JSON.parse(raw);
    if (!d.clients) d.clients = [];
    if (!d.listings) d.listings = [];
    if (!d.settings) d.settings = structuredClone(DEFAULT_DATA.settings);
    if (!d.entities) d.entities = { neighbourhood:{}, community:{}, building:{}, city:{}, developer:{} };
    ['neighbourhood','community','building','city','developer'].forEach(k => { if (!d.entities[k]) d.entities[k] = {}; });
    if (!Array.isArray(d.feedback)) d.feedback = [];
    // Migrate legacy listing.showings[] (per-listing) → client.showings[listingId] (per-client, notes history)
    (d.listings||[]).forEach(l => {
      if (Array.isArray(l.showings) && l.showings.length) {
        l.showings.forEach(s => {
          const cl = (d.clients||[]).find(c => c.id === s.clientId);
          if (!cl) return;
          if (!cl.showings) cl.showings = {};
          if (!cl.showings[l.id]) cl.showings[l.id] = { notes: [], summary: null };
          const txt = ((s.reaction ? '['+s.reaction+'] ' : '') + (s.notes||'')).trim();
          if (txt) cl.showings[l.id].notes.push({ id: uid(), date: s.showingDate || new Date().toISOString(), text: txt });
        });
      }
      delete l.showings;
    });
    return d;
  } catch (e) {
    console.error('load failed', e);
    return structuredClone(DEFAULT_DATA);
  }
}
function save() {
  state.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (sync.enabled) schedulePush();
}
function loadSyncConfig() {
  try {
    const raw = localStorage.getItem(SYNC_KEY);
    if (!raw) return structuredClone(DEFAULT_SYNC);
    return { ...structuredClone(DEFAULT_SYNC), ...JSON.parse(raw) };
  } catch (e) { return structuredClone(DEFAULT_SYNC); }
}
function saveSyncConfig() {
  localStorage.setItem(SYNC_KEY, JSON.stringify(sync));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

// ---- Utility ---------------------------------------
function $(sel, el=document) { return el.querySelector(sel); }
function fmt$(n) {
  if (n == null || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-CA');
}
function fmt$short(n) {
  if (n == null || isNaN(n)) return '—';
  const v = Math.round(n);
  if (v >= 1_000_000) return '$' + (v/1_000_000).toFixed(v >= 10_000_000 ? 1 : 2) + 'M';
  if (v >= 1_000) return '$' + Math.round(v/1000) + 'K';
  return '$' + v.toLocaleString('en-CA');
}
function fmtMoneySigned(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '−' : '+';
  return sign + '$' + Math.abs(Math.round(n)).toLocaleString('en-CA');
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(name) {
  return (name||'?').split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase();
}

// ---- Scoring ---------------------------------------
function locationMatches(listingCity, locations) {
  if (!locations || !locations.length) return true;
  const lc = (listingCity||'').toLowerCase().trim();
  if (!lc) return false;
  return locations.some(loc => {
    const l = loc.toLowerCase().trim();
    return lc.includes(l) || l.includes(lc);
  });
}

function computeMatchScore(listing, client) {
  const c = client.criteria || {};
  const w = c.weights || {};
  const parts = [];

  if (c.locations?.length) {
    const s = locationMatches(listing.city, c.locations) ? 100 : 0;
    parts.push({ key: 'location', score: s, weight: w.location ?? 2 });
  }
  if (c.propertyTypes?.length) {
    const s = c.propertyTypes.includes(listing.propertyType) ? 100 : 0;
    parts.push({ key: 'type', score: s, weight: w.type ?? 1 });
  }
  if (c.budgetMax) {
    const p = +listing.price || 0;
    let s = 100;
    if (p > c.budgetMax) {
      const over = (p - c.budgetMax) / c.budgetMax;
      s = Math.max(0, 100 - over * 200);
    }
    parts.push({ key: 'price', score: s, weight: w.price ?? 2 });
  }
  if (c.bedsMin) {
    const b = totalBeds(listing); // bedrooms + dens
    const s = b >= c.bedsMin ? 100 : Math.max(0, (b / c.bedsMin) * 100);
    parts.push({ key: 'beds', score: s, weight: w.beds ?? 1 });
  }
  if (c.bathsMin) {
    const b = effBaths(listing); // full baths + 0.5 per washroom
    const s = b >= c.bathsMin ? 100 : Math.max(0, (b / c.bathsMin) * 100);
    parts.push({ key: 'baths', score: s, weight: w.baths ?? 0.5 });
  }
  if (c.sizeMin) {
    const sz = +listing.sizeSqft || 0;
    const s = sz >= c.sizeMin ? 100 : Math.max(0, (sz / c.sizeMin) * 100);
    parts.push({ key: 'size', score: s, weight: w.size ?? 1 });
  }
  if (c.cashflowRequired) {
    const cf = computeCashflow(listing, { withRental: c.cashflowWithRental, client });
    const want = c.cashflowMin || 0;
    let s;
    if (cf.netMonthly >= want) s = 100;
    else {
      const diff = want - cf.netMonthly;
      s = Math.max(0, 100 - (diff / 500) * 25);
    }
    parts.push({ key: 'cashflow', score: s, weight: w.cashflow ?? 2, cf });
  }

  if (!parts.length) return { score: 100, parts: [] };
  const totalW = parts.reduce((a, p) => a + p.weight, 0);
  const score = parts.reduce((a, p) => a + p.score * p.weight, 0) / totalW;
  return { score: Math.round(score), parts };
}

function scoreClass(score, threshold) {
  if (score == null) return '';
  if (score >= threshold) return 'good';
  if (score >= 50) return 'warn';
  return 'bad';
}

// Blended match score: rule-based criteria + AI screening (when available).
// Returns { score, crit, ai }. If no AI screening yet, score == criteria score.
function effectiveScore(client, listing) {
  const crit = computeMatchScore(listing, client).score;
  const ai = client.screenings && client.screenings[listing.id] ? client.screenings[listing.id].score : null;
  if (ai == null) return { score: crit, crit, ai: null };
  return { score: Math.round(crit * 0.5 + ai * 0.5), crit, ai };
}

function firstSentence(text, max=130) {
  if (!text) return '';
  const t = String(text).replace(/\s+/g, ' ').trim();
  const m = t.match(/^.*?[.!?](\s|$)/);
  let s = m ? m[0].trim() : t;
  if (s.length > max) s = s.slice(0, max).trim() + '…';
  return s;
}

// Resolve mortgage assumptions: a client's own override wins, else global defaults.
function getMortgageParams(client) {
  const g = state.settings;
  const m = client && client.mortgage;
  return {
    downPct: (m && m.downPct != null) ? +m.downPct : g.defaultDownPct,
    rate: (m && m.rate != null) ? +m.rate : g.defaultMortgageRate,
    amortYears: (m && m.amortYears != null) ? +m.amortYears : g.defaultAmortYears,
    insuranceMonthly: (m && m.insuranceMonthly != null) ? +m.insuranceMonthly : g.defaultInsuranceMonthly,
  };
}

function computeCashflow(listing, opts={}) {
  const mp = getMortgageParams(opts.client);
  const price = +listing.price || 0;
  // A per-listing override (rare) still wins over the client/global params.
  const downPct = listing.downPaymentPct != null ? +listing.downPaymentPct : mp.downPct;
  const rate = listing.mortgageRate != null ? +listing.mortgageRate : mp.rate;
  const years = listing.amortYears != null ? +listing.amortYears : mp.amortYears;
  const principal = price * (1 - downPct/100);
  const r_eff = Math.pow(1 + (rate/100)/2, 1/6) - 1;
  const n = years * 12;
  let monthlyMortgage = 0;
  if (principal > 0 && r_eff > 0 && n > 0) {
    monthlyMortgage = principal * (r_eff * Math.pow(1+r_eff, n)) / (Math.pow(1+r_eff, n) - 1);
  }
  const propTaxMonthly = (+listing.propertyTax || 0) / 12;
  const maintMonthly = +listing.maintenanceFee || 0;
  const insMonthly = listing.insuranceMonthly != null ? +listing.insuranceMonthly : mp.insuranceMonthly;
  const rental = opts.withRental ? (+listing.estRentalIncome || 0) : 0;
  const expenses = monthlyMortgage + propTaxMonthly + maintMonthly + insMonthly;
  const net = rental - expenses;
  return { monthlyMortgage, propTaxMonthly, maintMonthly, insMonthly, rental, expenses, netMonthly: net, principal, downPct, rate, years };
}

// ---- GitHub Gist sync ------------------------------
let _pushTimer = null;
function schedulePush() {
  if (!sync.enabled) return;
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(pushToGist, 1200);
}
function setSyncStatus(s) {
  const dot = $('#sync-dot');
  dot.classList.remove('live','syncing','error');
  if (!sync.enabled) {
    dot.title = 'Cloud sync off — tap settings';
    return;
  }
  if (s === 'live') { dot.classList.add('live'); dot.title = 'Cloud sync on'; }
  else if (s === 'syncing') { dot.classList.add('syncing'); dot.title = 'Syncing…'; }
  else if (s === 'error') { dot.classList.add('error'); dot.title = 'Sync error — check settings'; }
}
async function pullFromGist(silent) {
  if (!sync.enabled || !sync.gistId || !sync.token) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch('https://api.github.com/gists/' + sync.gistId, {
      headers: { 'Authorization': 'token ' + sync.token, 'Accept': 'application/vnd.github+json' },
    });
    if (!res.ok) throw new Error('Pull failed: ' + res.status);
    const gist = await res.json();
    const file = gist.files['showings-data.json'];
    if (!file) { setSyncStatus('live'); return; }
    let content = file.content;
    if (file.truncated && file.raw_url) {
      const rawRes = await fetch(file.raw_url);
      content = await rawRes.text();
    }
    const remote = JSON.parse(content);
    // Merge: pick whichever updatedAt is more recent
    const ru = remote.updatedAt ? new Date(remote.updatedAt).getTime() : 0;
    const lu = state.updatedAt ? new Date(state.updatedAt).getTime() : 0;
    if (ru > lu) {
      state = remote;
      if (!state.settings) state.settings = structuredClone(DEFAULT_DATA.settings);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
      if (!silent) toast('Pulled latest from cloud');
    }
    sync.lastPullAt = new Date().toISOString();
    saveSyncConfig();
    setSyncStatus('live');
  } catch (e) {
    console.error('pull error', e);
    setSyncStatus('error');
    if (!silent) toast('Pull failed: ' + e.message);
  }
}
async function pushToGist() {
  if (!sync.enabled || !sync.gistId || !sync.token) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch('https://api.github.com/gists/' + sync.gistId, {
      method: 'PATCH',
      headers: { 'Authorization': 'token ' + sync.token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        files: { 'showings-data.json': { content: JSON.stringify(state, null, 2) } }
      }),
    });
    if (!res.ok) throw new Error('Push failed: ' + res.status);
    sync.lastPushAt = new Date().toISOString();
    saveSyncConfig();
    setSyncStatus('live');
  } catch (e) {
    console.error('push error', e);
    setSyncStatus('error');
  }
}
async function createGist() {
  if (!sync.token) throw new Error('Token required');
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': 'token ' + sync.token, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: 'Showings — Buyer Client Manager data',
      public: false,
      files: { 'showings-data.json': { content: JSON.stringify(state, null, 2) } },
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || ('Create failed: ' + res.status));
  }
  const gist = await res.json();
  return gist.id;
}

    return raw ? JSON.parse(raw) : { googleClientId: '', allowedEmails: [] };
  } catch { return { googleClientId: '', allowedEmails: [] }; }
}
function saveAuthCfg(cfg) { localStorage.setItem(AUTH_CFG_KEY, JSON.stringify(cfg)); }

function loadSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (s.expiresAt && s.expiresAt > Date.now()) return s;
    // expired
    localStorage.removeItem(AUTH_KEY);
    return null;
  } catch { return null; }
}
function saveSession(s) {
  s.expiresAt = Date.now() + AUTH_DURATION_MS;
  localStorage.setItem(AUTH_KEY, JSON.stringify(s));
}
function clearSession() { localStorage.removeItem(AUTH_KEY); }

function loadPasskey() {
  try {
    const raw = localStorage.getItem(PASSKEY_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function savePasskey(pk) { localStorage.setItem(PASSKEY_KEY, JSON.stringify(pk)); }
function clearPasskey() { localStorage.removeItem(PASSKEY_KEY); }

function isAuthEnabled() {
  const cfg = loadAuthCfg();
  return !!(cfg.googleClientId && cfg.allowedEmails && cfg.allowedEmails.length > 0);
}
function currentSession() { return loadSession(); }

function decodeJwtPayload(token) {
  const parts = token.split('.');
  if (parts.length !== 3) throw new Error('Invalid token');
  const b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
  const pad = b64.length % 4 ? '='.repeat(4 - b64.length % 4) : '';
  return JSON.parse(atob(b64 + pad));
}

// Render gate vs app
function showAppShell() {
  $('#auth-gate').style.display = 'none';
  $('#app-shell').style.display = '';
}
function showAuthGate() {
  $('#app-shell').style.display = 'none';
  $('#auth-gate').style.display = 'flex';
  // Wire Face ID button if passkey exists
  const pk = loadPasskey();
  if (pk && window.PublicKeyCredential) {
    $('#auth-passkey-btn').style.display = '';
    $('#auth-divider').style.display = '';
  } else {
    $('#auth-passkey-btn').style.display = 'none';
    $('#auth-divider').style.display = 'none';
  }
  // Init Google Sign-In if config present and library loaded
  const cfg = loadAuthCfg();
  if (cfg.googleClientId && window.google?.accounts?.id) {
    try {
      google.accounts.id.initialize({
        client_id: cfg.googleClientId,
        callback: handleGoogleCredential,
        auto_select: false,
        cancel_on_tap_outside: false,
      });
      const target = $('#g-signin');
      target.innerHTML = '';
      google.accounts.id.renderButton(target, {
        theme: 'outline', size: 'large', type: 'standard', shape: 'pill', text: 'signin_with',
      });
    } catch (e) {
      showAuthError('Google sign-in setup error: ' + e.message);
    }
  } else if (cfg.googleClientId) {
    // GIS library not loaded yet — wait for it
    const wait = setInterval(() => {
      if (window.google?.accounts?.id) { clearInterval(wait); showAuthGate(); }
    }, 200);
    setTimeout(() => clearInterval(wait), 5000);
  }
}
function showAuthError(msg) {
  const el = $('#auth-error');
  el.textContent = msg;
  el.style.display = '';
}

function handleGoogleCredential(resp) {
  if (!resp || !resp.credential) { showAuthError('No credential returned'); return; }
  try {
    const payload = decodeJwtPayload(resp.credential);
    const cfg = loadAuthCfg();
    // Verify audience matches our Client ID — protects against token replay from other apps
    if (payload.aud !== cfg.googleClientId) { showAuthError('Token audience mismatch'); return; }
    if (payload.iss !== 'https://accounts.google.com' && payload.iss !== 'accounts.google.com') { showAuthError('Bad issuer'); return; }
    if (payload.exp && payload.exp * 1000 < Date.now()) { showAuthError('Google token expired'); return; }
    const email = (payload.email || '').toLowerCase();
    const allowed = (cfg.allowedEmails || []).map(e => e.toLowerCase());
    if (!allowed.includes(email)) {
      showAuthError(`${email} is not on the allowed list. Sign out and try a different account.`);
      try { google.accounts.id.disableAutoSelect(); } catch {}
      return;
    }
    saveSession({ email, name: payload.name, picture: payload.picture, method: 'google' });
    onAuthSuccess();
  } catch (e) {
    showAuthError('Sign-in failed: ' + e.message);
  }
}

async function unlockWithPasskey() {
  const pk = loadPasskey();
  if (!pk) { showAuthError('No passkey registered on this device'); return; }
  if (!window.PublicKeyCredential) { showAuthError('Passkeys not supported in this browser'); return; }
  try {
    const rawId = Uint8Array.from(atob(pk.credentialId), c => c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ type: 'public-key', id: rawId, transports: ['internal'] }],
        userVerification: 'required',
        timeout: 60000,
      }
    });
    if (!assertion) { showAuthError('Passkey unlock canceled'); return; }
    saveSession({ email: pk.email, name: pk.name || pk.email, method: 'passkey' });
    onAuthSuccess();
  } catch (e) {
    showAuthError('Passkey error: ' + (e.message || e));
  }
}

async function registerPasskeyForCurrentUser() {
  const sess = currentSession();
  if (!sess) { toast('Sign in first'); return; }
  if (!window.PublicKeyCredential) { toast('Passkeys not supported here'); return; }
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userIdBytes = new TextEncoder().encode(sess.email);
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'Showings', id: location.hostname },
        user: {
          id: userIdBytes,
          name: sess.email,
          displayName: sess.name || sess.email,
        },
        pubKeyCredParams: [{type: 'public-key', alg: -7}, {type: 'public-key', alg: -257}],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
          residentKey: 'preferred',
        },
        timeout: 60000,
        attestation: 'none',
      }
    });
    const rawId = new Uint8Array(cred.rawId);
    const idB64 = btoa(String.fromCharCode(...rawId));
    savePasskey({ credentialId: idB64, email: sess.email, name: sess.name });
    toast('Face ID / passkey registered on this device');
  } catch (e) {
    toast('Registration failed: ' + (e.message || e));
  }
}

async function callClaude(system, user, opts={}) {
  const cfg = loadClaudeCfg();

function parseScreeningResponse(text) {
  if (!text) throw new Error('Empty response');
  let t = text.trim();
  // Strip code fences if present
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');

  if (isNaN(score)) score = null;
  if (score != null) score = Math.max(0, Math.min(100, score));
  const fit = ['strong','moderate','weak'].includes((obj.fit||'').toLowerCase()) ? obj.fit.toLowerCase() : 'moderate';
  return { score, fit, analysis: String(obj.analysis || '').trim() };
}

// ---- Routing / tabs --------------------------------
// ---- Hash router -----------------------------------
// URL is the source of truth. User actions render a view AND push a hash;
// browser back/forward fire popstate -> route() re-renders from the hash.
// Render functions sync the hash via _syncHash (no-op when it already matches),
// so calling them directly (taps) or from route() (back/forward) both stay in sync.
const MAIN_TABS = ['clients','listings','compare','setup'];

function _tabHash(t) {
  return t === 'setup' ? ('setup' + (setupSub === 'mortgage' ? '/mortgage' : '')) : t;
}
function _syncHash(h, replace) {
  const target = '#' + h;
  if (location.hash === target) return;
  if (replace) history.replaceState(null, '', target);
  else history.pushState(null, '', target);
}
function _hideModal() {
  $('#modal-backdrop').classList.remove('open');
  $('#modal').innerHTML = '';
  document.body.style.overflow = '';
}
// Render a main tab without touching the hash (used by route() + base-tab setup).
function _renderTab(t) {
  currentTab = t;
  _hideModal();
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === t);
  });
  render();
}
// Ensure a tab is rendered behind a modal route (deep links / fresh load).
function _ensureBase(tab) {
  const want = tab || (MAIN_TABS.includes(currentTab) ? currentTab : 'clients');
  if (currentTab !== want || !$('#main').innerHTML.trim()) _renderTab(want);
}
function _openSettings(key) {
  if (key === 'account') openAuthPage();
  else if (key === 'claude') openClaudePage();
  else if (key === 'sync') openSyncPage();
  else if (key === 'backup') openBackupPage();
  else if (key === 'install') openInstallPage();
  else if (key === 'about') openAboutPage();
  else openMenu();
}
function route() {
  const raw = (location.hash || '').replace(/^#\/?/, '');
  const parts = raw.split('/').filter(Boolean).map(p => { try { return decodeURIComponent(p); } catch (e) { return p; } });
  const head = parts[0] || 'clients';
  if (MAIN_TABS.includes(head)) {
    if (head === 'setup') setupSub = parts[1] === 'mortgage' ? 'mortgage' : 'areas';
    _renderTab(head);
    return;
  }
  if (head === 'client' && parts[1]) {
    _ensureBase('clients');
    if (parts[2] != null) _clientCtx = { id: parts[1], tab: +parts[2] || 0 };
    openClient(parts[1]);
    return;
  }
  if (head === 'listing' && parts[1]) { _ensureBase('listings'); briefListing(parts[1]); return; }
  if (head === 'entity' && parts[1] && parts[2]) { setupSub = 'areas'; _ensureBase('setup'); openEntityPage(parts[1], parts[2]); return; }
  if (head === 'menu') { _ensureBase(); openMenu(); return; }
  if (head === 'settings' && parts[1]) { _ensureBase(); _openSettings(parts[1]); return; }
  _renderTab('clients');
}

function switchTab(t) {
  _renderTab(t);
  _syncHash(_tabHash(t));
}
function onFabClick() {
  if (currentTab === 'clients') editClient(null);
  else if (currentTab === 'listings') editListing(null);
  else if (currentTab === 'compare') toast('Tap listings to add to compare');
}

// ---- Render ----------------------------------------
function render() {
  const main = $('#main');
  const title = $('#page-title');
  const fab = $('#fab');
  fab.style.display = (currentTab === 'compare' || currentTab === 'setup') ? 'none' : 'flex';

  if (currentTab === 'clients') { title.textContent = 'Clients'; main.innerHTML = renderClients(); }
  else if (currentTab === 'listings') { title.textContent = 'Listings'; main.innerHTML = renderListings(); }
  else if (currentTab === 'compare') { title.textContent = 'Compare'; main.innerHTML = renderCompare(); }
  else if (currentTab === 'setup') { title.textContent = 'Setup'; main.innerHTML = renderSetup(); }
  updateCommentBar();
}

function togglePinClient(id) {

function criteriaSummary(c) {
  const cr = c.criteria || {};
  const bits = [];
  if (cr.locations?.length) bits.push(cr.locations.slice(0,2).join(' / '));
  if (cr.budgetMax) bits.push('≤ ' + fmt$short(cr.budgetMax));
  if (cr.bedsMin) bits.push(cr.bedsMin + '+ bed');
  if (cr.cashflowRequired) bits.push('cashflow' + (cr.cashflowWithRental?' (w/ rent)':''));

function renderListings() {
  if (state.listings.length === 0) {
    return `<div class="empty">
      <h2>No listings yet</h2>
      <p>Tap <b>＋</b> to add a listing from any site. Use <b>Smart Paste</b> to auto-extract price, beds, baths, sqft from copied listing text.</p>

    </div>`;
  }

  const sorted = [...state.listings].sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
  let visible = sorted;
  if (_filterStatus) visible = visible.filter(l => (l.status||'to_show') === _filterStatus);
  let activeClient = null;
  if (_filterClientId) {
    activeClient = state.clients.find(c => c.id === _filterClientId);
    if (activeClient) {
      visible = visible.map(l => ({...l, _score: effectiveScore(activeClient, l).score}));
      if (_onlyMatches) {
        const t = activeClient.criteria?.matchThreshold || 70;
        visible = visible.filter(l => l._score >= t);
      }
      visible = visible.sort((a,b) => (b._score||0) - (a._score||0));
    }
  }

  const filterBar = `<div class="filter-bar">
    <button class="filter-chip ${!_filterClientId?'on':''}" onclick="_filterClientId=''; _onlyMatches=false; render()">Anyone</button>
    ${state.clients.map(c => `<button class="filter-chip ${_filterClientId===c.id?'on':''}" onclick="_filterClientId='${c.id}'; render()">${esc(c.name.split(' ')[0])}</button>`).join('')}

    <button class="filter-chip ${!_filterStatus?'on':''}" onclick="_filterStatus=''; render()">All</button>

    <button class="filter-chip ${_filterStatus==='liked'?'on':''}" onclick="_filterStatus='liked'; render()">Liked</button>
    ${activeClient ? `<span style="width:1px; background:var(--border); margin:0 2px"></span><button class="filter-chip ${_onlyMatches?'on':''}" onclick="_onlyMatches=!_onlyMatches; render()">Above threshold</button>` : ''}
  </div>`;

  const items = visible.length
    ? visible.map(l => renderListingFeed(l, activeClient)).join('')
    : `<div class="empty"><p>No listings match this filter.</p></div>`;

  return filterBar + items;
}

function renderListingFeed(l, client) {
  const status = l.status || 'to_show';
  const statusLabels = { to_show:'To Show', shown:'Shown', liked:'Liked', rejected:'Rejected' };
  const statusClass = { to_show:'pill', shown:'pill warn', liked:'pill good', rejected:'pill bad' };

  let scoreHtml = '';
  if (client) {
    const score = l._score ?? effectiveScore(client, l).score;
    const t = client.criteria?.matchThreshold || 70;
    scoreHtml = `<div class="score ${scoreClass(score, t)}">${score}%</div>`;
  }

  const specs = [];
  if (l.beds != null || l.dens) specs.push(`${bedsLabel(l)} bd`);
  if (l.baths != null || l.washrooms) specs.push(`${bathsLabel(l)} ba`);
  if (l.sizeSqft) specs.push(`${(+l.sizeSqft).toLocaleString()} sf`);
  if (l.parkingSpaces != null) specs.push(`${l.parkingSpaces} prkg`);
  if (l.lockers != null) specs.push(l.lockers > 0 ? (l.lockers === 1 ? 'locker' : l.lockers + ' lkrs') : 'no lkr');
  if (l.propertyType) specs.push(l.propertyType);

  // Finance line: price/sf, rent/sf (if data), maint/sf (if data), total cost/sf, cashflow
  const fin = [];
  const psf = pricePsf(l), rentSf = rentPsf(l), maintSf = maintPsf(l), totSf = totalCostPsf(l, client);
  if (psf) fin.push(`<span>${fmt$psf(psf)}</span>`);
  if (rentSf) fin.push(`<span>Rent ${fmt$psfm(rentSf)}</span>`);
  if (maintSf) fin.push(`<span>Maint ${fmt$psfm(maintSf)}</span>`);
  if (totSf) fin.push(`<span>Total ${fmt$psfm(totSf)}</span>`);
  if (l.price) {
    const withRent = (+l.estRentalIncome) > 0;
    const cf = computeCashflow(l, { withRental: withRent, client });
    const cfColor = cf.netMonthly >= 0 ? 'var(--good)' : 'var(--bad)';
    fin.push(`<span style="color:${cfColor}; font-weight:700">CF ${fmtMoneySigned(cf.netMonthly)}/mo${withRent ? '' : ' (no rent)'}</span>`);
  }

  const inCompare = compareSelection.includes(l.id);

  return `<div class="listing-feed" onclick="briefListing('${l.id}'${client?`, '${client.id}'`:''})">
    <div class="head">
      <div class="addr">
        <h3>${esc(l.address || 'Untitled')}</h3>
        <div class="city">${esc(l.city || '')}${l.mlsNumber?' · MLS '+esc(l.mlsNumber):''}${l.builder?' · '+esc(l.builder):''}</div>
      </div>
      <div>
        <div class="price">${fmt$short(l.price)}</div>
        ${scoreHtml ? `<div style="margin-top:6px; text-align:right">${scoreHtml}</div>` : ''}
      </div>
    </div>
    <div class="specs">${specs.map(s=>`<span>${esc(s)}</span>`).join('')}</div>
    ${fin.length ? `<div class="specs">${fin.join('')}</div>` : ''}
    ${l.quickBrief ? `<div class="brief">${esc(l.quickBrief)}</div>` : ''}
    <div class="actions" onclick="event.stopPropagation()">
      <span class="${statusClass[status]}">${statusLabels[status]}</span>
      <div style="flex:1"></div>
      <button class="btn ghost small" onclick="editListing('${l.id}')">Edit</button>
      <button class="btn ghost small" onclick="toggleCompare('${l.id}')">${inCompare?'✓ Compare':'Compare'}</button>
      ${l.realmasterUrl ? `<button class="btn small" onclick="shareListing('${l.id}', event)">Share</button>` : ''}
    </div>
  </div>`;
}

function renderCompare() {

        <dt>Price / sf</dt><dd>${fmt$psf(pricePsf(l))}</dd>
        <dt>Bed (+den)</dt><dd>${bedsLabel(l)}</dd>
        <dt>Bath (+powder)</dt><dd>${bathsLabel(l)}</dd>
        <dt>Size</dt><dd>${l.sizeSqft ? (+l.sizeSqft).toLocaleString()+' sf' : '—'}</dd>
        <dt>Parking</dt><dd>${l.parkingSpaces!=null?l.parkingSpaces:'—'}</dd>
        <dt>Locker</dt><dd>${l.lockers!=null?(l.lockers>0?(l.lockers===1?'Yes':l.lockers):'No'):'—'}</dd>
        <dt>Maintenance / mo</dt><dd>${fmt$(l.maintenanceFee)}${maintPsf(l)?' &nbsp;<span class="muted smaller">'+fmt$psfm(maintPsf(l))+'</span>':''}</dd>
        <dt>Tax / yr</dt><dd>${fmt$(l.propertyTax)}</dd>
        <dt>Est. Rent / mo</dt><dd>${fmt$(l.estRentalIncome)}${rentPsf(l)?' &nbsp;<span class="muted smaller">'+fmt$psfm(rentPsf(l))+'</span>':''}</dd>
        <dt>Mortgage / mo</dt><dd>${fmt$(cfYes.monthlyMortgage)}</dd>
        <dt>Total cost / sf</dt><dd>${fmt$psfm(totalCostPsf(l, cmpClient))}</dd>
        <dt>CF w/o rent</dt><dd style="color:${cfNo.netMonthly>=0?'var(--good)':'var(--bad)'}">${fmtMoneySigned(cfNo.netMonthly)}</dd>

        <button class="btn ghost small" onclick="toggleCompare('${l.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');

  return head + `<div class="compare-wrap"><div class="compare">${cols}</div></div>`;
}

// ---- Client view (tabbed) --------------------------
let _clientCtx = { id: null, tab: 0 };
const CLIENT_TABS = ['Overview', 'Persona', 'Listings'];

function openClient(id) {
  const c = state.clients.find(x => x.id === id);
  if (!c) return;
  _clientCtx = { id, tab: (_clientCtx.id === id ? _clientCtx.tab : 0) };
  showModal({
    title: c.name,
    body: `
      <div class="ctabs" id="ctabs">
        ${CLIENT_TABS.map((t,i)=>`<button class="ctab ${i===_clientCtx.tab?'on':''}" onclick="switchClientTab(${i})">${t}</button>`).join('')}
      </div>
      <div class="ctab-panel-wrap" id="ctab-panel">${renderClientTabPanel(id, _clientCtx.tab)}</div>
    `,
    footer: `
      <button class="btn ghost" onclick="deleteClient('${c.id}')">Delete</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="editClient('${c.id}')">Edit</button>
    `
  });
  _syncHash('client/' + id + (_clientCtx.tab ? '/' + _clientCtx.tab : ''));
  setTimeout(attachClientSwipe, 60);
}
function openClientAt(id, tab) { _clientCtx = { id, tab }; openClient(id); }

function switchClientTab(i) {
  _clientCtx.tab = i;
  const wrap = $('#ctab-panel');
  if (wrap) wrap.innerHTML = renderClientTabPanel(_clientCtx.id, i);
  document.querySelectorAll('#ctabs .ctab').forEach((b, idx) => b.classList.toggle('on', idx === i));
  _syncHash('client/' + _clientCtx.id + (i ? '/' + i : ''), true);
}
function attachClientSwipe() {
  const wrap = $('#ctab-panel');
  if (!wrap) return;
  let x0=null, y0=null, dx=0, dy=0;
  wrap.addEventListener('touchstart', e => { const t=e.touches[0]; x0=t.clientX; y0=t.clientY; dx=0; dy=0; }, {passive:true});
  wrap.addEventListener('touchmove', e => { if(x0==null) return; const t=e.touches[0]; dx=t.clientX-x0; dy=t.clientY-y0; }, {passive:true});
  wrap.addEventListener('touchend', () => {
    if (x0==null) return;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)*1.4) {
      if (dx < 0) switchClientTab(Math.min(CLIENT_TABS.length-1, _clientCtx.tab+1));
      else switchClientTab(Math.max(0, _clientCtx.tab-1));
    }
    x0=y0=null;
  }, {passive:true});
}

function renderClientTabPanel(id, tab) {
  const c = state.clients.find(x => x.id === id);
  if (!c) return '';
  if (tab === 0) return renderClientOverview(c);
  if (tab === 1) return renderClientPersona(c);
  return renderClientListings(c);
}

function clientListingCard(c, l) {
  const eff = effectiveScore(c, l);
  const t = c.criteria?.matchThreshold || 70;

  const specs = [];

  if (l.baths!=null || l.washrooms) specs.push(`${ico('bath')} ${bathsLabel(l)}`);

      <div class="cl-addr">${esc(l.address||'Untitled')}<div class="muted smaller" style="font-weight:400">${esc(l.city||'')}${l.propertyType?' · '+esc(l.propertyType):''}</div></div>

  </div>`;

function criteriaDetail(c) {
  const cr = c.criteria || {};
  const lines = [];
  if (cr.locations?.length) lines.push(`<b>Location</b> — ${cr.locations.map(esc).join(', ')}`);
  if (cr.propertyTypes?.length) lines.push(`<b>Type</b> — ${cr.propertyTypes.map(esc).join(', ')}`);
  if (cr.budgetMin || cr.budgetMax) lines.push(`<b>Budget</b> — ${cr.budgetMin?fmt$short(cr.budgetMin):'—'} to ${cr.budgetMax?fmt$short(cr.budgetMax):'—'}`);
  if (cr.bedsMin) lines.push(`<b>Bedrooms</b> — ${cr.bedsMin}+`);
  if (cr.bathsMin) lines.push(`<b>Bathrooms</b> — ${cr.bathsMin}+`);
  if (cr.sizeMin) lines.push(`<b>Size</b> — ${cr.sizeMin}+ sqft`);
  if (cr.cashflowRequired) lines.push(`<b>Cashflow</b> — ≥ ${fmt$(cr.cashflowMin||0)}/mo ${cr.cashflowWithRental?'(with rental income)':'(without rental)'}`);
  if (cr.specialRequirements) lines.push(`<b>Special</b> — ${esc(cr.specialRequirements)}`);
  lines.push(`<b>Match threshold</b> — ${cr.matchThreshold||70}%`);
  return lines.join('<br>');
}

// Tag-input helpers
function renderTagHtml(text) {
  return `<span class="tag">${esc(text)}<button type="button" onclick="this.parentNode.remove()">×</button></span>`;
}
function handleTagKey(ev) {
  if (ev.key !== 'Enter' && ev.key !== ',') return;
  ev.preventDefault();
  const v = ev.target.value.trim().replace(/,$/, '').trim();
  if (!v) return;
  const span = document.createElement('span');
  span.className = 'tag';
  span.textContent = v;
  const btn = document.createElement('button');
  btn.type = 'button'; btn.textContent = '×';
  btn.onclick = () => span.remove();
  span.appendChild(btn);
  ev.target.parentNode.insertBefore(span, ev.target);
  ev.target.value = '';
}

function parseListingText(text, url) {
  text = (text || '').trim();
  const flat = text.replace(/[ \t]+/g, ' ');
  const oneLine = flat.replace(/\s+/g, ' ');
  const out = {};

  const priceMatches = [...oneLine.matchAll(/\$\s?([\d]{1,3}(?:,\d{3})+|\d{6,8})(?:\.\d+)?(?:\s?(?:M|K))?/gi)];
  let best = 0;
  priceMatches.forEach(m => {
    let n = parseFloat(m[1].replace(/,/g, ''));
    const tail = (m[0].match(/M|K/i)||[''])[0].toUpperCase();
    if (tail === 'M') n *= 1_000_000;
    else if (tail === 'K') n *= 1_000;
    if (n >= 100_000 && n <= 50_000_000 && n > best) best = n;
  });
  if (best) out.price = best;

  // Bedrooms + dens: "3+1 beds" → beds 3, dens 1; "3 bed" → beds 3, dens 0
  const bedM = oneLine.match(/(\d+)\s*(?:\+\s*(\d+))?\s*(?:beds?|bdrm|bdrms|bedroom|bedrooms|br\b|bd\b)/i);
  if (bedM) { out.beds = +bedM[1]; out.dens = bedM[2] ? +bedM[2] : 0; }
  // Textual den ("+ den", "plus den", "N den")
  const denM = oneLine.match(/(\d+)\s*dens?\b/i);
  if (denM) out.dens = +denM[1];
  else if ((out.dens == null || out.dens === 0) && /\+\s*den\b|\bplus\s+den\b/i.test(oneLine)) out.dens = 1;

  // Full baths + washrooms: "2.5 baths" → baths 2, washrooms 1; "3 full baths" → baths 3, washrooms 0
  const bathM = oneLine.match(/(\d+)(\.5)?\s*(?:full\s+|3[\-\s]?(?:pc|piece)\s+|4[\-\s]?(?:pc|piece)\s+)?(?:baths?|bathroom|bathrooms|ba\b)/i);
  if (bathM) { out.baths = +bathM[1]; out.washrooms = bathM[2] ? 1 : 0; }
  // Explicit washroom / powder / 2-piece counts override
  const washM = oneLine.match(/(\d+)\s*(?:washrooms?|powder\s?rooms?|half[\-\s]?baths?|2[\-\s]?(?:pc|piece))/i);
  if (washM) out.washrooms = +washM[1];

  const sizeM = oneLine.match(/(\d{1,3}(?:,\d{3})+|\d{3,5})\s*(?:-\s*(?:\d{1,3}(?:,\d{3})+|\d{3,5}))?\s*(?:sq\.?\s?ft|sqft|sf\b|square\s?feet?)/i);
  if (sizeM) out.sizeSqft = parseInt(sizeM[1].replace(/,/g, ''));

  const mainM = oneLine.match(/(?:maintenance|maint\.?\s?fees?|condo\s?fee|strata\s?fee|strata)[^\d$]{0,20}\$?\s?(\d[\d,]*)/i);
  if (mainM) out.maintenanceFee = parseInt(mainM[1].replace(/,/g, ''));

  const taxM = oneLine.match(/(?:property\s?tax(?:es)?|annual\s?tax(?:es)?|tax(?:es)?)[^\d$]{0,20}\$?\s?(\d[\d,]*)/i);
  if (taxM) {
    let t = parseInt(taxM[1].replace(/,/g, ''));
    if (t > 100 && t < 600) t *= 12;
    out.propertyTax = t;
  }

  const typeKeywords = [
    ['Condo Townhouse', /condo\s?town(?:house)?|condo\s?th/i],
    ['Condo', /\bcondo(?:minium)?\b|\bapartment\b/i],
    ['Townhouse', /\btown(?:house)?\b|\bth\b/i],
    ['Semi-Detached', /semi[-\s]?detached/i],
    ['Detached', /\bdetached\b|\bsingle\s?family\b/i],
    ['Multi-Plex', /\b(?:duplex|triplex|fourplex|multi[-\s]?plex)\b/i],
  ];
  for (const [name, re] of typeKeywords) {
    if (re.test(oneLine)) { out.propertyType = name; break; }
  }

  const addrM = oneLine.match(/(\d+\s*-?\s*\d*\s+[A-Z][a-zA-Z]*(?:\s+[A-Z][a-zA-Z]*){0,4}\s+(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Boulevard|Blvd|Crescent|Cres|Court|Ct|Place|Pl|Way|Lane|Ln|Terrace|Ter|Parkway|Pkwy|Trail|Trl|Heights|Hts)\b\.?(?:\s+(?:East|West|North|South|E|W|N|S))?)/);
  if (addrM) out.address = addrM[1].trim();

  const cityM = flat.match(/(?:^|,|\n)\s*([A-Z][a-zA-Z]+(?:\s+[A-Z][a-zA-Z]+){0,2})\s*[\s,]\s*(?:ON|BC|AB|QC|SK|MB|NS|NB|PE|NL|YT|NT|NU|Ontario|British\sColumbia|Alberta|Quebec)\b/m);
  if (cityM) {
    let city = cityM[1].trim();
    const streetSuffixes = /\b(?:Street|St|Road|Rd|Avenue|Ave|Drive|Dr|Boulevard|Blvd|Crescent|Cres|Court|Ct|Place|Pl|Way|Lane|Ln|Terrace|Ter|Parkway|Pkwy|Trail|Trl|Heights|Hts)$/i;
    if (streetSuffixes.test(city)) city = city.split(/\s+/).pop();
    out.city = city;
  }

  const rentM = oneLine.match(/(?:rent(?:al)?(?:\s?income)?|monthly\s?rent)[^\d$]{0,20}\$?\s?(\d[\d,]*)/i);
  if (rentM) {
    const r = parseInt(rentM[1].replace(/,/g, ''));
    if (r > 500 && r < 50000) out.estRentalIncome = r;
  }

  if (!url) {
    const urlM = oneLine.match(/https?:\/\/[^\s)>"']+/);
    if (urlM) out.url = urlM[0];
  } else out.url = url;

  // Parking — "Parking: 2", "Total Parking Spaces: 2", "2 parking", "Garage Spaces: 2"
  let parkingM = oneLine.match(/(?:total\s+)?parking(?:\s+spaces?)?\s*[:\-]\s*(\d+)/i);
  if (!parkingM) parkingM = oneLine.match(/garage\s+spaces?\s*[:\-]\s*(\d+)/i);
  if (!parkingM) parkingM = oneLine.match(/(\d+)\s+parking\s+spaces?/i);
  if (parkingM) {
    const n = parseInt(parkingM[1], 10);
    if (n >= 0 && n <= 20) out.parkingSpaces = n;
  }

  // Locker — check yes/no patterns first to avoid the numeric regex grabbing a digit
  // from a neighbouring field (e.g. "Garage Spaces: 2 Locker: None").
  if (/\bno\s+lockers?\b/i.test(oneLine) || /lockers?\s*[:\-]\s*(?:no|none)\b/i.test(oneLine)) {
    out.lockers = 0;
  } else {
    let lockerM = oneLine.match(/lockers?\s*[:\-]\s*(\d+)/i);
    if (!lockerM) {
      // "2 Lockers" — must come immediately before "Locker(s)" with the digit acting as
      // the count. Anchor with the word "Lockers" right after the digit, and only allow
      // it to be preceded by a space (not a colon or another digit).
      lockerM = oneLine.match(/(?:^|\s)(\d+)\s+lockers?\b/i);
    }
    if (lockerM) {
      const n = parseInt(lockerM[1], 10);
      if (n >= 0 && n <= 10) out.lockers = n;
    } else if (/lockers?\s*[:\-]\s*(?:yes|owned|included|exclusive)/i.test(oneLine) || /\bhas\s+lockers?\b/i.test(oneLine)) {
      out.lockers = 1;
    }
  }

  // MLS# — handles "MLS#: C7654321", "MLS® C7654321", "MLS Number C1234567", or bare "C7654321"
  // when preceded by "MLS" within ~15 chars. TRREB-style is one letter + 7 digits; other
  // boards may be all digits (7–10) or letters+digits.
  const mlsM = oneLine.match(/MLS(?:\s?®)?\s*(?:#|number|no\.?|id)?\s*[:#]?\s*([A-Z]\d{6,10}|\d{7,10})/i);
  if (mlsM) out.mlsNumber = mlsM[1].toUpperCase();

  // Builder / Developer — keyword-prefixed patterns. Capture up to common terminators.
  const builderPatterns = [
    /developer\s*[:\-]\s*([A-Z][^\n;|]{1,60}?)(?=\s*(?:[\.,\n;|]|$))/i,
    /builder\s*[:\-]\s*([A-Z][^\n;|]{1,60}?)(?=\s*(?:[\.,\n;|]|$))/i,
    /developed\s+by\s+([A-Z][^\n;|]{1,60}?)(?=\s*(?:[\.,\n;|]|$))/i,
    /built\s+by\s+([A-Z][^\n;|]{1,60}?)(?=\s*(?:[\.,\n;|]|$))/i,
    /brought\s+to\s+you\s+by\s+([A-Z][^\n;|]{1,60}?)(?=\s*(?:[\.,\n;|]|$))/i,
  ];
  for (const re of builderPatterns) {
    const bm = flat.match(re);
    if (bm) {
      const b = bm[1].replace(/\s+/g, ' ').trim();
      // Reject obvious false positives (e.g., a sentence captured by the pattern)
      if (b.length >= 2 && !/^(the|a|an|this|that)\s/i.test(b)) {
        out.builder = b;
        break;
      }
    }
  }

  // Showing info — best-effort: grab sentences/lines mentioning booking & access keywords.
  const showRe = /(showing|broker\s?bay|brokerbay|showingtime|lock\s?box|\blbx?\b|by\s+appointment|appointment\s+(?:only|required)|\d+\s*(?:h(?:ou)?rs?|hour)\s+notice|24\s?hr|list(?:ing)?\s+(?:sales(?:person)?|agent)\s+(?:to\s+)?accompany|remove\s+(?:your\s+)?shoes|easy\s+to\s+show|do\s+not\s+(?:use|book))/i;
  const segs = flat.split(/\n|(?<=[.!?])\s+/).map(s => s.trim()).filter(s => s.length > 3 && showRe.test(s));
  if (segs.length) {
    // De-dupe and cap length
    const seen = new Set(); const picked = [];
    for (const s of segs) { const k = s.toLowerCase(); if (!seen.has(k)) { seen.add(k); picked.push(s); } if (picked.length >= 5) break; }
    out.showingInstructions = picked.join(' ').slice(0, 400);
  }

  return out;
}

function updateSmartPastePreview() {
  const text = $('#sp-text')?.value || '';
  const url = $('#sp-url')?.value || '';
  const parsed = parseListingText(text, url);
  const preview = $('#sp-preview');
  if (!preview) return;
  const lines = [];
  if (parsed.price) lines.push(`Price <b>${fmt$(parsed.price)}</b>`);
  if (parsed.address) lines.push(`Addr <b>${esc(parsed.address)}</b>`);
  if (parsed.city) lines.push(`City <b>${esc(parsed.city)}</b>`);
  if (parsed.propertyType) lines.push(`Type <b>${esc(parsed.propertyType)}</b>`);
  if (parsed.beds != null) lines.push(`Beds <b>${parsed.beds}${parsed.dens?'+'+parsed.dens:''}</b>`);
  if (parsed.baths != null) lines.push(`Baths <b>${parsed.baths}${parsed.washrooms?'+'+parsed.washrooms:''}</b>`);
  if (parsed.sizeSqft) lines.push(`<b>${parsed.sizeSqft.toLocaleString()} sf</b>`);
  if (parsed.maintenanceFee) lines.push(`Maint <b>${fmt$(parsed.maintenanceFee)}/mo</b>`);
  if (parsed.propertyTax) lines.push(`Tax <b>${fmt$(parsed.propertyTax)}/yr</b>`);
  if (parsed.estRentalIncome) lines.push(`Rent <b>${fmt$(parsed.estRentalIncome)}/mo</b>`);
  if (parsed.mlsNumber) lines.push(`MLS# <b>${esc(parsed.mlsNumber)}</b>`);
  if (parsed.builder) lines.push(`Builder <b>${esc(parsed.builder)}</b>`);
  if (parsed.parkingSpaces != null) lines.push(`Parking <b>${parsed.parkingSpaces}</b>`);
  if (parsed.lockers != null) lines.push(`Locker <b>${parsed.lockers > 0 ? (parsed.lockers === 1 ? 'Yes' : parsed.lockers) : 'No'}</b>`);
  if (parsed.showingInstructions) lines.push(`Showing <b>✓</b>`);
  preview.innerHTML = lines.length ? '<b>Detected:</b> ' + lines.join(' · ') : 'No fields detected yet.';
}

function applySmartPaste() {
  const text = $('#sp-text')?.value || '';
  const url = $('#sp-url')?.value || '';
  if (!text.trim() && !url.trim()) { toast('Paste something first'); return; }
  const stash = window._editStash || { listingId:null, cur:{}, assigned:[] };
  const ctx = gatherParseContext({ listingId: stash.listingId, neighbourhood: stash.cur.nbhd, community: stash.cur.comm, building: stash.cur.build, city: stash.cur.city, builder: stash.cur.builder });
  const parsed = parseListingText(text + (ctx ? '\n\n' + ctx : ''), url);
  const c = stash.cur;
  if (parsed.url) c.url = parsed.url;
  if (parsed.address) c.addr = parsed.address;
  if (parsed.city) c.city = parsed.city;
  if (parsed.propertyType) c.type = parsed.propertyType;
  if (parsed.price) c.price = String(parsed.price);
  if (parsed.beds != null) c.beds = String(parsed.beds);
  if (parsed.dens != null) c.dens = String(parsed.dens);
  if (parsed.baths != null) c.baths = String(parsed.baths);
  if (parsed.washrooms != null) c.wash = String(parsed.washrooms);
  if (parsed.showingInstructions) c.showinst = parsed.showingInstructions;
  if (parsed.sizeSqft) c.size = String(parsed.sizeSqft);
  if (parsed.maintenanceFee) c.maint = String(parsed.maintenanceFee);
  if (parsed.propertyTax) c.tax = String(parsed.propertyTax);
  if (parsed.estRentalIncome) c.rent = String(parsed.estRentalIncome);
  if (parsed.mlsNumber) c.mls = parsed.mlsNumber;
  if (parsed.builder) c.builder = parsed.builder;
  if (parsed.parkingSpaces != null) c.parking = String(parsed.parkingSpaces);
  if (parsed.lockers != null) c.locker = String(parsed.lockers);
  if (text.trim()) c.raw = text;  // keep the original pasted source for future reference
  window._editStash = stash;
  closeModal();
  setTimeout(reopenListingEdit, 60);
  toast('Fields filled — review and save');
}

async function applyAISmartPaste() {
  const text = $('#sp-text')?.value || '';
  const url = $('#sp-url')?.value || '';
  if (!text.trim()) { toast('Paste listing text first'); return; }
  if (!hasClaudeKey()) { toast('Add your Claude API key in Menu → Claude API'); return; }
  const btn = $('#sp-ai-btn');
  if (btn) { btn.textContent = 'Parsing…'; btn.classList.add('gen-btn-busy'); }
  try {
    const stash = window._editStash || { listingId:null, cur:{}, assigned:[] };
    const ctx = gatherParseContext({ listingId: stash.listingId, neighbourhood: stash.cur.nbhd, community: stash.cur.comm, building: stash.cur.build, city: stash.cur.city, builder: stash.cur.builder });
    const { system, user } = buildExtractionPrompt(text, ctx);
    const out = await callClaude(system, user, { maxTokens: 900 });
    const p = parseExtraction(out);
    const c = stash.cur;
    const setIf = (k, v) => { if (v !== null && v !== undefined && String(v).trim() !== '') c[k] = String(v).trim(); };
    if (url.trim()) c.url = url.trim();
    else { const um = text.match(/https?:\/\/[^\s)>"']+/); if (um) c.url = um[0]; }
    setIf('addr', p.address); setIf('city', p.city);
    setIf('nbhd', p.neighbourhood); setIf('comm', p.community); setIf('build', p.building);
    setIf('type', p.propertyType);
    setIf('price', p.price); setIf('beds', p.beds); setIf('baths', p.baths); setIf('size', p.sizeSqft);
    if (p.dens != null) c.dens = String(p.dens);
    if (p.washrooms != null) c.wash = String(p.washrooms);
    setIf('showinst', p.showingInstructions);
    setIf('maint', p.maintenanceFee); setIf('tax', p.propertyTax); setIf('rent', p.estRentalIncome);
    setIf('mls', p.mlsNumber); setIf('builder', p.builder);
    if (p.parkingSpaces !== null && p.parkingSpaces !== undefined) c.parking = String(p.parkingSpaces);
    if (p.lockers !== null && p.lockers !== undefined) c.locker = String(p.lockers);
    c.raw = text;
    window._editStash = stash;
    closeModal();
    setTimeout(reopenListingEdit, 60);
    toast('AI-parsed — review and save');
  } catch (e) {
    toast('AI parse failed: ' + e.message);
    if (btn) { btn.textContent = '✦ Parse with AI'; btn.classList.remove('gen-btn-busy'); }
  }
}

function briefListing(id, clientId) {
  const l = state.listings.find(x => x.id === id);
  if (!l) return;
  // Use the active client's mortgage assumptions if one is in context (e.g. filtered feed).
  const client = clientId ? state.clients.find(c => c.id === clientId) : null;
  const cfYes = computeCashflow(l, { withRental: true, client });
  const cfNo = computeCashflow(l, { withRental: false, client });
  const usingCustom = client && client.mortgage;
  const inCompare = compareSelection.includes(id);

  showModal({
    title: 'Brief',
    body: `<div class="brief-wrap">
      <div class="addr">${esc(l.address || 'Untitled')}</div>
      <div class="city-type">${esc(l.city||'')} · ${esc(l.propertyType||'')}${l.mlsNumber?' · MLS '+esc(l.mlsNumber):''}</div>
      ${l.builder?`<div class="muted smaller" style="margin-top:2px">Builder · ${esc(l.builder)}</div>`:''}
      ${usingCustom?`<div class="muted smaller" style="margin-top:2px">Cashflow using ${esc(client.name)}'s mortgage assumptions</div>`:''}
      <div class="price-big">${fmt$(l.price)}</div>
      <div class="specs-grid">
        <div class="stat"><div class="lbl">Bed (+den) / Bath (+powder)</div><div class="val">${bedsLabel(l)} / ${bathsLabel(l)}</div></div>
        <div class="stat"><div class="lbl">Size — stated</div><div class="val">${l.sizeSqft ? (+l.sizeSqft).toLocaleString()+' sf' : '—'}${(l.usableSqft&&l.sizeSqft)?'<div class="muted smaller">usable '+(+l.usableSqft).toLocaleString()+' sf · '+(Math.round((l.usableSqft-l.sizeSqft)/l.sizeSqft*100)>=0?'+':'')+Math.round((l.usableSqft-l.sizeSqft)/l.sizeSqft*100)+'%</div>':(l.usableSqft?'<div class="muted smaller">usable '+(+l.usableSqft).toLocaleString()+' sf</div>':'')}</div></div>
        <div class="stat"><div class="lbl">Parking / Locker</div><div class="val">${l.parkingSpaces!=null?l.parkingSpaces:'—'} / ${l.lockers!=null?(l.lockers>0?l.lockers:'none'):'—'}</div></div>
        <div class="stat"><div class="lbl">Price / sf</div><div class="val">${fmt$psf(pricePsf(l))}</div></div>
        <div class="stat"><div class="lbl">Maint / mo</div><div class="val">${fmt$(l.maintenanceFee)}${maintPsf(l)?'<div class="muted smaller">'+fmt$psfm(maintPsf(l))+'</div>':''}</div></div>

function togglePickListing(clientId, listingId) {

let _screenBusy = {};
async function screenListing(clientId, listingId, onDone) {
  if (!hasClaudeKey()) { toast('Add your Claude API key in Menu → Claude API'); return; }
  const c = state.clients.find(x => x.id === clientId);
  const l = state.listings.find(x => x.id === listingId);
  if (!c || !l) return;
  const bkey = clientId + ':' + listingId;
  _screenBusy[bkey] = true; if (onDone) onDone();
  try {
    const { system, user } = buildScreeningPrompt(c, l);
    const text = await callClaude(system, user, { maxTokens: 700 });
    const parsed = parseScreeningResponse(text);
    if (!c.screenings) c.screenings = {};
    c.screenings[listingId] = { ...parsed, generatedAt: new Date().toISOString() };
    save();
  } catch (e) {
    toast('Screening failed: ' + e.message);
  } finally {
    _screenBusy[bkey] = false;
    if (onDone) onDone();
  }
}

const ENTITY_TYPES = ['neighbourhood','community','building','city','developer'];
const ENTITY_TYPE_LABEL = { neighbourhood:'Neighbourhood', community:'Community', building:'Building', city:'City / market', developer:'Developer' };
const ENTITY_TYPE_PLURAL = { neighbourhood:'Neighbourhoods', community:'Communities', building:'Buildings', city:'Cities', developer:'Developers' };
function entityValueOf(l, type) {
  if (type === 'neighbourhood') return l.neighbourhood || '';
  if (type === 'community') return l.community || '';
  if (type === 'building') return l.building || '';
  if (type === 'city') return l.city || '';
  if (type === 'developer') return l.builder || '';
  return '';
}
function distinctEntityKeys(type) {
  const set = new Set();
  state.listings.forEach(l => { const v = entityValueOf(l, type).trim(); if (v) set.add(v); });
  Object.keys(state.entities[type] || {}).forEach(k => set.add(k));
  return [...set].sort((a,b)=>a.localeCompare(b));
}
function setListingEntity(listingId, type, inputId) {
  const v = ($('#' + inputId)?.value || '').trim();
  if (!v) { toast('Enter a name'); return; }
  const l = state.listings.find(x => x.id === listingId);
  if (!l) return;
  if (type === 'neighbourhood') l.neighbourhood = v;
  else if (type === 'community') l.community = v;
  else if (type === 'building') l.building = v;
  else if (type === 'city') l.city = v;
  else if (type === 'developer') l.builder = v;
  save();
  openListingIntel(listingId);
}

// ---- Share ------------------------------------------
async function shareListing(id, ev) {
  if (ev) ev.stopPropagation();
  const l = state.listings.find(x => x.id === id);
  if (!l || !l.realmasterUrl) { toast('No listing URL'); return; }
  const url = l.realmasterUrl;
  if (navigator.share) {
    try { await navigator.share({ url, title: l.address || 'Listing' }); return; } catch (e) {}
  }
  try { await navigator.clipboard.writeText(url); toast('Link copied'); }
  catch (e) {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Link copied'); } catch (_) { toast('Could not copy'); }
    ta.remove();
  }
}
