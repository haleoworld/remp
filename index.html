function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      if (!d.clients || !d.listings) throw new Error('Invalid file');
      if (!confirm(`Replace current data with ${d.clients.length} clients and ${d.listings.length} listings?`)) return;
      state = d;
      if (!state.settings) state.settings = structuredClone(DEFAULT_DATA.settings);
      save(); closeModal(); render(); toast('Imported');
    } catch (e) { alert('Could not import: ' + e.message); }
  };
  reader.readAsText(file);
}

// ---- Notes & AI summaries (reusable) ---------------
// Section descriptors live in _notesCtx, keyed by a short section key, so onclick
// handlers can stay free of fragile escaped strings.
let _notesCtx = {};
let _genBusy = {};

function notesAccessor(desc) {
  if (desc.kind === 'client') {
    const c = state.clients.find(x => x.id === desc.clientId);
    return {
      getNotes: () => (c.personaNotes || (c.personaNotes = [])),
      getSummary: () => c.personaSummary || null,
      setSummary: (s) => { c.personaSummary = s; },
    };
  }
  if (desc.kind === 'listing') {
    const l = state.listings.find(x => x.id === desc.listingId);
    return {
      getNotes: () => (l.propertyNotes || (l.propertyNotes = [])),
      getSummary: () => l.propertySummary || null,
      setSummary: (s) => { l.propertySummary = s; },
    };
  }
  if (desc.kind === 'showing') {
    // Post-showing notes live on the CLIENT, keyed by listing.
    const c = state.clients.find(x => x.id === desc.clientId);
    if (!c.showings) c.showings = {};
    if (!c.showings[desc.listingId]) c.showings[desc.listingId] = { notes: [], summary: null };
    const b = c.showings[desc.listingId];
    return {
      getNotes: () => (b.notes || (b.notes = [])),
      getSummary: () => b.summary || null,
      setSummary: (s) => { b.summary = s; },
    };
  }
  // entity (shared)
  if (!state.entities[desc.entityType]) state.entities[desc.entityType] = {};
  const store = state.entities[desc.entityType];
  if (!store[desc.entityKey]) store[desc.entityKey] = { notes: [], summary: null };
  const b = store[desc.entityKey];
  return {
    getNotes: () => (b.notes || (b.notes = [])),
    getSummary: () => b.summary || null,
    setSummary: (s) => { b.summary = s; },
  };
}

function mdLite(text) {
  let h = esc(text);
  h = h.replace(/^#{1,6}\s*(.+)$/gm, '<b>$1</b>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  h = h.replace(/^\s*[-*]\s+(.+)$/gm, '• $1');
  h = h.replace(/\n/g, '<br>');
  return h;
}

function summaryLabel(key, title) {
  const acc = notesAccessor(_notesCtx[key]);
  const n = acc.getNotes().length;
  const has = !!acc.getSummary();
  return `${title}${n ? ` · ${n} note${n===1?'':'s'}` : ''}${has ? ' · ✓ summary' : ''}`;
}

function renderNotesSectionInner(key) {
  const desc = _notesCtx[key];
  const acc = notesAccessor(desc);
  const notes = acc.getNotes().slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const summary = acc.getSummary();
  const busy = _genBusy[key];
  const shared = desc.kind === 'entity'
    ? `<div class="muted smaller" style="margin-bottom:8px">Shared across all listings with ${ENTITY_LABEL[desc.entityType]} "${esc(desc.entityKey)}".</div>` : '';
  const history = notes.length
    ? notes.map(n => `<div class="note-entry">
        <div class="ne-body">
          <div class="ne-date">${(n.date||'').slice(0,10)}</div>
          <div class="ne-text">${esc(n.text)}</div>
        </div>
        <button class="ne-del" onclick="deleteNote('${key}','${n.id}')" aria-label="Delete">✕</button>
      </div>`).join('')
    : '<div class="muted smaller">No notes yet.</div>';
  const summaryHtml = summary ? `<div class="summary-box">
    <div class="sb-head"><span class="sb-title">AI Summary</span>
      <button class="btn ghost small" onclick="genSummary('${key}')" ${busy?'disabled':''}>Regenerate</button></div>
    <div class="sb-body">${mdLite(summary.text)}</div>
    <div class="sb-meta">Generated ${new Date(summary.generatedAt).toLocaleString()} · from ${summary.basedOn} note${summary.basedOn===1?'':'s'}</div>
  </div>` : '';
  return `${shared}
    ${history}
    <div class="note-add">
      <textarea id="noteinput-${key}" placeholder="Add a note (e.g. what you learned after talking to them)…"></textarea>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="btn small" onclick="addNote('${key}')">Add note</button>
        <button class="btn ghost small ${busy?'gen-btn-busy':''}" onclick="genSummary('${key}')">${busy ? 'Generating…' : (summary ? 'Regenerate summary' : '✦ Generate summary')}</button>
      </div>
    </div>
    ${summaryHtml}`;
}

function notesSectionHtml(key, title) {
  return `<details open id="sec-${key}" class="group" style="padding:0">
    <summary id="sum-${key}" style="padding:14px">${summaryLabel(key, title)}</summary>
    <div id="secbody-${key}" style="padding:0 14px 14px">${renderNotesSectionInner(key)}</div>
  </details>`;
}

function refreshNotesSection(key) {
  const body = $('#secbody-' + key);
  const sum = $('#sum-' + key);
  if (body) body.innerHTML = renderNotesSectionInner(key);
  if (sum) {
    const desc = _notesCtx[key];
    // title is everything before the first " · " in current label fallback; recompute from stored title
    sum.textContent = summaryLabel(key, _notesCtx[key]._title || sum.textContent.split(' · ')[0]);
  }
}

function addNote(key) {
  const input = $('#noteinput-' + key);
  const text = (input?.value || '').trim();
  if (!text) { toast('Type a note first'); return; }
  notesAccessor(_notesCtx[key]).getNotes().push({ id: uid(), date: new Date().toISOString(), text });
  save();
  refreshNotesSection(key);
  toast('Note saved');
}

function deleteNote(key, noteId) {
  const arr = notesAccessor(_notesCtx[key]).getNotes();
  const i = arr.findIndex(n => n.id === noteId);
  if (i >= 0) arr.splice(i, 1);
  save();
  refreshNotesSection(key);
}

async function genSummary(key) {
  if (!hasClaudeKey()) { toast('Add your Claude API key in Menu → Claude API'); return; }
  const desc = _notesCtx[key];
  const acc = notesAccessor(desc);
  const notes = acc.getNotes();
  if (!notes.length) { toast('Add at least one note first'); return; }
  let prompt;
  if (desc.kind === 'client') prompt = buildPersonaPrompt(state.clients.find(c => c.id === desc.clientId));
  else if (desc.kind === 'listing') prompt = buildPropertyPrompt(state.listings.find(l => l.id === desc.listingId));
  else if (desc.kind === 'showing') prompt = buildShowingPrompt(state.clients.find(c => c.id === desc.clientId), state.listings.find(l => l.id === desc.listingId), notes);
  else prompt = buildEntityPrompt(desc.entityType, desc.entityKey, notes);
  _genBusy[key] = true; refreshNotesSection(key);
  try {
    const text = await callClaude(prompt.system, prompt.user, { maxTokens: 1000 });
    acc.setSummary({ text, generatedAt: new Date().toISOString(), basedOn: notes.length });
    save();
  } catch (e) {
    toast('Failed: ' + e.message);
  } finally {
    _genBusy[key] = false;
    refreshNotesSection(key);
  }
}

// ---- Feedback / comments log -----------------------
const FB_PAGE_LABEL = { clients:'Clients', listings:'Listings', compare:'Compare', settings:'Settings' };
let _fbFilter = 'open';
let _fbPage = 'clients'; // page the drawer is currently operating on
function openCountFor(page) { return state.feedback.filter(f => f.page === page && f.status !== 'done').length; }
function setBadge(id, page) {
  const b = $('#' + id); if (!b) return;
  const n = openCountFor(page);
  if (n > 0) { b.style.display = ''; b.textContent = String(n); } else b.style.display = 'none';
}
function updateCommentBar() {
  setBadge('cb-badge', currentTab);
  const mcb = $('#mcb-badge');
  if (mcb && mcb.dataset.page) setBadge('mcb-badge', mcb.dataset.page);
}
function openFeedback() { openFeedbackForPage(currentTab); }
function openFeedbackForPage(page) {
  _fbPage = page;
  $('#fb-title').textContent = (FB_PAGE_LABEL[page] || 'Page') + ' · comments';
  renderFeedbackList();
  const d = $('#fb-drawer');
  d.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => { const l = $('#fb-list'); if (l) l.scrollTop = l.scrollHeight; $('#fb-input')?.focus(); }, 120);
}
function closeFeedback() {
  $('#fb-drawer').classList.remove('open');
  document.body.style.overflow = '';
}
function setFbFilter(f) {
  _fbFilter = f;
  document.querySelectorAll('#fb-filter button').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  renderFeedbackList();
}
function renderFeedbackList() {
  const list = $('#fb-list');
  if (!list) return;
  let items = state.feedback.filter(f => f.page === _fbPage);
  if (_fbFilter === 'open') items = items.filter(f => f.status !== 'done');
  items.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  if (!items.length) {
    list.innerHTML = `<div class="fb-empty">No ${_fbFilter==='open'?'open ':''}comments for ${FB_PAGE_LABEL[_fbPage]} yet.<br>Type below to add the first one.</div>`;
    return;
  }
  list.innerHTML = items.map(f => `<div class="fb-item ${f.status==='done'?'done':''}">
    <div class="fb-check" onclick="toggleFeedbackDone('${f.id}')">✓</div>
    <div class="fb-body">
      <div class="fb-text">${esc(f.text)}</div>
      <div class="fb-meta">${new Date(f.date).toLocaleDateString()}${f.status==='done'?' · done'+(f.completedAt?' '+new Date(f.completedAt).toLocaleDateString():''):''}</div>
    </div>
    <button class="fb-del" onclick="deleteFeedback('${f.id}')" aria-label="Delete">✕</button>
  </div>`).join('');
}
function submitFeedback() {
  const input = $('#fb-input');
  const text = (input?.value || '').trim();
  if (!text) { toast('Type something first'); return; }
  state.feedback.push({ id: uid(), page: _fbPage, date: new Date().toISOString(), text, status: 'open' });
  save();
  input.value = ''; input.style.height = 'auto';
  // Make sure new comment is visible regardless of filter
  if (_fbFilter !== 'open') { /* stays */ }
  renderFeedbackList();
  updateCommentBar();
  const l = $('#fb-list'); if (l) setTimeout(() => l.scrollTop = l.scrollHeight, 30);
}
function toggleFeedbackDone(id) {
  const f = state.feedback.find(x => x.id === id);
  if (!f) return;
  if (f.status === 'done') { f.status = 'open'; f.completedAt = null; }
  else { f.status = 'done'; f.completedAt = new Date().toISOString(); }
  save();
  renderFeedbackList();
  updateCommentBar();
}
function deleteFeedback(id) {
  state.feedback = state.feedback.filter(x => x.id !== id);
  save();
  renderFeedbackList();
  updateCommentBar();
}
async function copyAllFeedback() {
  // Export all comments across all pages, grouped, for handing to Claude.
  const byPage = {};
  state.feedback.forEach(f => { (byPage[f.page] = byPage[f.page] || []).push(f); });
  let out = 'Showings — feedback / requests / improvements\n';
  Object.keys(byPage).forEach(pg => {
    out += `\n## ${FB_PAGE_LABEL[pg] || pg}\n`;
    byPage[pg].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(f => {
      out += `- [${f.status==='done'?'x':' '}] ${f.text}\n`;
    });
  });
  if (!state.feedback.length) out += '\n(no comments yet)';
  try { await navigator.clipboard.writeText(out); toast('All comments copied'); }
  catch (e) {
    const ta = document.createElement('textarea'); ta.value = out; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('All comments copied'); } catch(_) { toast('Copy failed'); }
    ta.remove();
  }
}

// ---- Modal ------------------------------------------
function showModal({ title, body, footer, onBack, feedbackPage }) {
  const m = $('#modal');
  let fbBar = '';
  if (feedbackPage) {
    const n = openCountFor(feedbackPage);
    fbBar = `<div class="modal-comment-bar" onclick="openFeedbackForPage('${feedbackPage}')">
      <div class="cb-pill">Add a comment about ${esc(FB_PAGE_LABEL[feedbackPage]||feedbackPage)}…</div>
      <span class="cb-badge" id="mcb-badge" data-page="${feedbackPage}" ${n>0?'':'style="display:none"'}>${n}</span>
    </div>`;
  }
  m.innerHTML = `
    <div class="modal-header">
      ${onBack ? `<button class="icon-btn" onclick="${onBack}" aria-label="Back">‹</button>` : ''}
      <h2>${esc(title)}</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">${body}</div>
    ${fbBar}
    <div class="modal-footer">${footer||''}</div>
  `;
  $('#modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  _hideModal();
  _syncHash(_tabHash(currentTab), true);
}
function onBackdropClick(e) {
  if (e.target.id === 'modal-backdrop') closeModal();
}

// ---- Boot -------------------------------------------
function boot() {
  applyTheme(loadTheme());
  // Flat icons for static chrome
  const mb = $('#menu-btn'); if (mb) mb.innerHTML = ico('menu');
  const tabIco = { clients:'user', listings:'home', compare:'compare', setup:'sliders' };
  document.querySelectorAll('nav.tabs button').forEach(b => {
    const span = b.querySelector('.tab-icon'); if (span) span.innerHTML = ico(tabIco[b.dataset.tab] || 'home');
  });
  if (!isAuthEnabled()) {
    // No auth configured yet — open app immediately so user can set things up.
    showAppShell();
    route();
    setSyncStatus(sync.enabled ? 'live' : null);
    if (sync.enabled && sync.gistId && sync.token) pullFromGist(true);
    return;
  }
  if (currentSession()) {
    onAuthSuccess();
  } else {
    showAuthGate();
  }
}
boot();
// Browser back/forward → re-render from the hash.
window.addEventListener('popstate', route);
// ESC to close modal
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeFeedback(); } });

// Ensure data is pushed before unload
window.addEventListener('beforeunload', () => {
  if (sync.enabled && _pushTimer) {
    clearTimeout(_pushTimer);
    pushToGist();
  }
});
</script>
